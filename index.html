<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Stile globale per i contenitori a schermo intero */
      .fullscreen-overlay {
        display: none; /* Nascosto di default */
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background-color: black;
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      
      video {
        width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      /* Pulsante generico di chiusura (X) */
      .close-btn {
        position: absolute;
        top: 20px; right: 20px;
        background-color: rgba(255, 255, 255, 0.3);
        color: white;
        border: none;
        border-radius: 50%;
        width: 50px; height: 50px;
        font-size: 24px;
        font-family: sans-serif;
        cursor: pointer;
        display: flex; justify-content: center; align-items: center;
        backdrop-filter: blur(5px);
        z-index: 10000;
      }

      /* Stili specifici per lo Slideshow */
      .slideshow-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .slide {
        display: none;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      /* Frecce per cambiare foto nello slideshow */
      .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        padding: 15px;
        font-size: 24px;
        cursor: pointer;
        user-select: none;
        border-radius: 5px;
      }
      #prevBtn { left: 20px; }
      #nextBtn { right: 20px; }
    </style>
  </head>
  <body>

    <div id="containerVideoA" class="fullscreen-overlay">
      <button class="close-btn" onclick="chiudiContenuto('containerVideoA', 'videoA')">&times;</button>
      <video id="videoA" src="./video-sport-1.mp4" controls playsinline></video>
    </div>

    <div id="containerVideoB" class="fullscreen-overlay">
      <button class="close-btn" onclick="chiudiContenuto('containerVideoB', 'videoB')">&times;</button>
      <video id="videoB" src="./video-sport-2.mp4" controls playsinline></video>
    </div>

    <div id="containerSlideshow" class="fullscreen-overlay">
      <button class="close-btn" onclick="chiudiContenuto('containerSlideshow')">&times;</button>
      
      <div class="slideshow-container">
        <img class="slide" src="./3B_MariellaDeGasperi.jpg">
        <img class="slide" src="./3C_B1_1974-Fumiani.jpg">
        <img class="slide" src="./3D_B2_1978-Saetta Signorini.jpg">
        
        <button id="prevBtn" class="nav-btn" onclick="cambiaSlide(-1)">&#10094;</button>
        <button id="nextBtn" class="nav-btn" onclick="cambiaSlide(1)">&#10095;</button>
      </div>
    </div>


    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity id="target0" mindar-image-target="targetIndex: 0"></a-entity>
      <a-entity id="target1" mindar-image-target="targetIndex: 1"></a-entity>
      <a-entity id="target2" mindar-image-target="targetIndex: 2"></a-entity>
    </a-scene>


    <script>
      // --- GESTIONE DEI TARGET REALTÀ AUMENTATA ---
      
      // Target 0 -> Attiva Video A
      document.querySelector('#target0').addEventListener("targetFound", () => {
        apriContenuto('containerVideoA', 'videoA');
      });

      // Target 1 -> Attiva Video B
      document.querySelector('#target1').addEventListener("targetFound", () => {
        apriContenuto('containerVideoB', 'videoB');
      });

      // Target 2 -> Attiva Slideshow
      document.querySelector('#target2').addEventListener("targetFound", () => {
        apriContenuto('containerSlideshow');
        mostraSlide(slideIndex = 0); // Resetta lo slideshow alla prima foto
      });


      // --- FUNZIONI DI APERTURA E CHIUSURA ---
      
      function apriContenuto(containerId, videoId = null) {
        document.getElementById(containerId).style.display = "flex";
        if (videoId) {
          document.getElementById(videoId).play();
        }
      }

      function chiudiContenuto(containerId, videoId = null) {
        document.getElementById(containerId).style.display = "none";
        if (videoId) {
          const video = document.getElementById(videoId);
          video.pause();
          video.currentTime = 0;
        }
      }


      // --- LOGICA INTERNA DELLO SLIDESHOW ---
      let slideIndex = 0;
      
      function cambiaSlide(direzione) {
        mostraSlide(slideIndex += direzione);
      }

      function mostraSlide(n) {
        const slides = document.getElementsByClassName("slide");
        
        // Se arrivo alla fine, ricomincio da capo
        if (n >= slides.length) { slideIndex = 0; }
        // Se vado indietro oltre la prima, vado all'ultima
        if (n < 0) { slideIndex = slides.length - 1; }
        
        // Nascondi tutte le immagini
        for (let i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
        }
        
        // Mostra solo quella corrente
        slides[slideIndex].style.display = "block";
      }
    </script>
  </body>
</html>
