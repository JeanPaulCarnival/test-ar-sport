<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="mioVideo" src="./video-sport.mp4" preload="auto" loop="true" response-type="arraybuffer" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#mioVideo" width="1" height="0.7" position="0 0 0"></a-video>
      </a-entity>
      
    </a-scene>

    <script>
      const targetEl = document.querySelector('[mindar-image-target]');
      const videoEl = document.querySelector('#mioVideo');
      targetEl.addEventListener("targetFound", event => {
        videoEl.play();
      });
      targetEl.addEventListener("targetLost", event => {
        videoEl.pause();
      });
    </script>
  </body>
</html>
